<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Abundance Tree AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    @font-face {
  font-family: 'MyFont';
  src: url('/Myfont.ttf') format('truetype');
}
   body { margin: 0; overflow: hidden; font-family: 'MyFont', cursive; }

  #ui-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100dvh;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  overflow-y: auto;
}
a-scene {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
    #landing-screen {
      text-align: center;
      color: white;
      padding: 40px;
    }

    #landing-screen h1 {
      font-size: 3em;
      margin-bottom: 10px;
      font-weight: normal;
    }

    #landing-screen p {
      font-size: 2em;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    .main-button {
      display: block;
      width: 240px;
      padding: 16px;
      margin: 10px auto;
      font-size: 2.1em;
      font-family: 'MyFont', cursive;
      border: 1px solid white;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: white;
      letter-spacing: 0.05em;
    }

    .main-button:active {
      background: rgba(255,255,255,0.2);
    }

    .hidden { display: none !important; }
  #leaf-selection-screen {
  text-align: center;
  color: white;
  padding: 20px;
  width: 100%;
}

#leaf-selection-screen h2 {
  font-size: 1.8em;
  font-weight: normal;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}


#leaf-options {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0px;
}

.leaf-option {
  cursor: pointer;
  width: 87vw;
  max-width: 370px;
}

.leaf-option img {
  width: 100%;
  height: auto;
  display: block;
  transition: filter 0.3s ease;
}

.leaf-option.selected img {
  filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9)) brightness(1.2);
}

#leaf-form-screen {
  width: 100%;
  color: white;
  text-align: center;
  padding: 20px;
  overflow-y: auto;
}

#form-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  max-width: 400px;
  margin: 0 auto;
}

#selected-leaf-img {
  width: 60vw;
  max-width: 250px;
  height: auto;
  transition: filter 0.3s ease;
}


textarea#leaf-message {
  width: 85vw;
  max-width: 350px;
  height: 120px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 8px;
  color: white;
  font-family: 'MyFont', cursive;
  font-size: 1.6em;
  padding: 12px;
  resize: none;
}

#color-picker {
  display: flex;
  flex-direction: row;
  gap: 12px;
  justify-content: center;
}

.color-swatch {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  border: none;
}

.color-swatch.selected {
  transform: scale(1.3);
  outline: 2px solid white;
  outline-offset: 2px;
}

.back-button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.6);
  font-family: 'MyFont', cursive;
  font-size: 1em;
  cursor: pointer;
  margin-top: 5px;
}

a {
  color: inherit;
  text-decoration: none;
}

#studio-link {
  position: fixed;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  color: rgba(255, 255, 255, 0.6);
  font-size: 1.1rem;
  text-decoration: none;
  letter-spacing: 0.05em;
}

#studio-link:hover {
  color: rgba(255, 255, 255, 0.85);
}

#leaf-modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 200;
  background: rgba(0,0,0,0.72);
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#leaf-modal-leaf {
  position: relative;
  width: 80vw;
  max-width: 380px;
}

#leaf-modal-img {
  width: 100%;
  height: auto;
  display: block;
}

#leaf-modal-text {
  position: absolute;
  top: 35%;
  left: 0;
  right: 0;
  bottom: 0;
  padding-left: 22%;
  padding-right: 8%;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  pointer-events: none;
}

#leaf-modal-message {
  font-family: 'MyFont', cursive;
  font-size: clamp(0.9em, 3.8vw, 1.25em);
  color: #2a1a00;
  line-height: 1.4;
  margin: 0 0 6px;
  word-wrap: break-word;
}

#leaf-modal-date {
  font-family: 'MyFont', cursive;
  font-size: clamp(0.65em, 2.2vw, 0.8em);
  color: rgba(42, 26, 0, 0.6);
  margin: 0;
}

#leaf-modal-close {
  position: absolute;
  top: 4px;
  right: 4px;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.65);
  font-size: 1.5em;
  line-height: 1;
  padding: 8px 10px;
  cursor: pointer;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#leaf-modal-close:active {
  color: white;
}
  </style>

</head>
<body>
  <a-scene mindar-image="imageTargetSrc: /targets.mind" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
 <a-entity mindar-image-target="targetIndex: 0">
</a-entity>

<div id="ar-instruction" style="
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  color: #FFC499;
  font-family: 'MyFont', cursive;
  font-size: 1.5em;
  text-align: center;
  opacity: 0;
  transition: opacity 1.5s ease;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  white-space: nowrap;
">Point your Camera at the whole tree</div>

<div id="tap-place-prompt" style="
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  color: white;
  font-family: 'MyFont', cursive;
  font-size: 1.5em;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  white-space: nowrap;
">Tap a spot to place your leaf</div>

<div id="tap-read-prompt" style="
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  color: white;
  font-family: 'MyFont', cursive;
  font-size: 1.5em;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  white-space: nowrap;
">Tap a leaf to read it</div>

<button id="ar-back-btn" style="
  display: none;
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 100;
  background: rgba(0,0,0,0.5);
  color: white;
  border: 1px solid white;
  border-radius: 4px;
  padding: 10px 16px;
  font-family: 'MyFont', cursive;
  font-size: 1.2em;
  cursor: pointer;
">← back</button>
  </a-scene>

  <div id="ui-overlay">
    <div id="landing-screen">
      <h1>Abundance Tree</h1>
      <p>A living record of collective gratitude</p>
      <button class="main-button" id="btn-see">See the tree</button>
      <button class="main-button" id="btn-add">Add your leaf</button>
      <a href="https://www.studiostang.com" target="_blank" rel="noopener noreferrer" id="studio-link">Click to see more at studiostang.com</a>
    </div>
    <div id="leaf-selection-screen" class="hidden">
      <h2>Choose your leaf</h2>
     
      <div id="leaf-options">
        <div class="leaf-option" data-leaf="1">
          <img src="/Leaf-1.png" alt="Leaf 1" />
        </div>
        <div class="leaf-option" data-leaf="2">
          <img src="/Leaf-2.png" alt="Leaf 2" />
        </div>
        <div class="leaf-option" data-leaf="3">
          <img src="/Leaf-3.png" alt="Leaf 3" />
        </div>
      </div>
         <button class="back-button" id="btn-back-to-landing">← back</button>
    </div>


    <div id="leaf-form-screen" class="hidden">
  <div id="form-container">
   <img id="selected-leaf-img" src="" alt="" style="display:none;" />
<div id="content-warning" class="hidden" style="background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 12px 16px; color: white; font-size: 1.2em; line-height: 1.4;">
  Please revise your message to keep this space kind and respectful for everyone.
</div>
    <textarea id="leaf-message" placeholder="write your response here..." maxlength="280"></textarea>
    <div id="color-picker">
      <div class="color-swatch" data-color="pale-yellow" style="background:#FFF9A0"></div>
<div class="color-swatch" data-color="peach" style="background:#FFAA80"></div>
<div class="color-swatch" data-color="turquoise" style="background:#7FFFD4"></div>
<div class="color-swatch" data-color="lime" style="background:#CCFF90"></div>
<div class="color-swatch" data-color="purple" style="background:#D4AAFF"></div>
<div class="color-swatch" data-color="pink" style="background:#FFB7C5"></div>
    </div>
    <button class="main-button" id="btn-submit">place my leaf</button>
    <button class="back-button" id="btn-back">← choose a different leaf</button>
  </div>
</div>

  </div>

  <div id="leaf-modal">
    <div id="leaf-modal-leaf">
      <img id="leaf-modal-img" src="" alt="leaf" />
      <div id="leaf-modal-text">
        <p id="leaf-modal-message"></p>
        <p id="leaf-modal-date"></p>
      </div>
      <button id="leaf-modal-close">✕</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  
<script>
let hideTimeout;
let instruction;
let inARMode = false;

// Store listeners so we can remove them cleanly
let onTargetFound = null;
let onTargetLost = null;
const target = document.querySelector('a-entity[mindar-image-target]');

function cleanupARListeners() {
  if (onTargetFound) target.removeEventListener('targetFound', onTargetFound);
  if (onTargetLost) target.removeEventListener('targetLost', onTargetLost);
  onTargetFound = null;
  onTargetLost = null;
  clearTimeout(hideTimeout);
}

function resetPrompts() {
  ['ar-instruction', 'tap-place-prompt', 'tap-read-prompt'].forEach(id => {
    const el = document.getElementById(id);
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.display = 'none';
  });
}

function enterAR() {
  document.getElementById('ui-overlay').classList.add('hidden');
  document.getElementById('ar-back-btn').style.display = 'block';
  instruction = document.getElementById('ar-instruction');
  inARMode = true;
  resetPrompts();
  instruction.style.display = 'block';
  setTimeout(() => { 
    instruction.style.transition = 'opacity 1.5s ease';
    instruction.style.opacity = '1'; 
  }, 100);
}

function showTapReadPrompt() {
  const tapRead = document.getElementById('tap-read-prompt');
  tapRead.style.display = 'block';
  setTimeout(() => { tapRead.style.opacity = '1'; }, 100);
  setTimeout(() => {
    tapRead.style.opacity = '0';
    setTimeout(() => { tapRead.style.display = 'none'; }, 1000);
  }, 6000);
}

function showTapPlacePrompt() {
  const tapPlace = document.getElementById('tap-place-prompt');
  tapPlace.style.display = 'block';
  setTimeout(() => { tapPlace.style.opacity = '1'; }, 100);
}

function hideTapPlacePrompt() {
  const tapPlace = document.getElementById('tap-place-prompt');
  tapPlace.style.opacity = '0';
  setTimeout(() => { tapPlace.style.display = 'none'; }, 1000);
}

function checkAlreadyTracking(onTracked) {
  setTimeout(() => {
    if (target.object3D && target.object3D.visible) {
      onTracked();
    }
  }, 500);
}

// AR back button
document.getElementById('ar-back-btn').addEventListener('click', function() {
  this.style.display = 'none';
  inARMode = false;
  cleanupARListeners();
  resetPrompts();
  hideLeafModal();
  window._tapToPlaceActive = false;
  window._pendingLeaf = null;

  document.querySelectorAll('a-image').forEach(function(leaf) {
    leaf.setAttribute('visible', 'false');
  });

  document.getElementById('ui-overlay').classList.remove('hidden');
  document.getElementById('landing-screen').classList.remove('hidden');
  document.getElementById('leaf-selection-screen').classList.add('hidden');
  document.getElementById('leaf-form-screen').classList.add('hidden');
});

// See the tree
document.getElementById('btn-see').addEventListener('click', async function() {
  cleanupARListeners();
  enterAR();

  function onFound() {
    instruction.style.opacity = '0';
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      instruction.style.display = 'none';
      showTapReadPrompt();
    }, 2500);
  }

  function onLost() {
    if (!inARMode) return;
    clearTimeout(hideTimeout);
    document.getElementById('tap-read-prompt').style.opacity = '0';
    document.getElementById('tap-read-prompt').style.display = 'none';
    instruction.style.transition = 'none';
    instruction.style.opacity = '0';
    instruction.style.display = 'block';
    setTimeout(() => {
      instruction.style.transition = 'opacity 1.5s ease';
      instruction.style.opacity = '1';
    }, 50);
  }

  onTargetFound = onFound;
  onTargetLost = onLost;
  target.addEventListener('targetFound', onTargetFound);
  target.addEventListener('targetLost', onTargetLost);
  checkAlreadyTracking(onFound);

  try {
    await window.spawnLeavesInAR(null);
  } catch(e) {
    alert('Error: ' + e.message);
  }
});

// Add your leaf flow
document.getElementById('btn-add').addEventListener('click', function() {
  document.getElementById('landing-screen').classList.add('hidden');
  document.getElementById('leaf-selection-screen').classList.remove('hidden');
});

document.querySelectorAll('.leaf-option').forEach(function(leaf) {
  leaf.addEventListener('click', function() {
    document.querySelectorAll('.leaf-option').forEach(l => l.classList.remove('selected'));
    this.classList.add('selected');
    const leafNumber = this.getAttribute('data-leaf');
    setTimeout(() => showLeafForm(leafNumber), 470);
  });
});

function showLeafForm(leafNumber) {
  document.getElementById('leaf-selection-screen').classList.add('hidden');
  document.getElementById('leaf-form-screen').classList.remove('hidden');
  const leafImages = { '1': '/Leaf-1.png', '2': '/Leaf-2.png', '3': '/Leaf-3.png' };
  document.getElementById('selected-leaf-img').src = leafImages[leafNumber];
  document.getElementById('selected-leaf-img').style.display = 'block';
}

document.getElementById('btn-back-to-landing').addEventListener('click', function() {
  document.getElementById('leaf-selection-screen').classList.add('hidden');
  document.getElementById('landing-screen').classList.remove('hidden');
});

document.getElementById('btn-back').addEventListener('click', function() {
  document.getElementById('leaf-form-screen').classList.add('hidden');
  document.getElementById('leaf-selection-screen').classList.remove('hidden');
  document.querySelectorAll('.leaf-option').forEach(l => l.classList.remove('selected'));
  document.getElementById('leaf-message').value = '';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.getElementById('selected-leaf-img').style.filter = 'none';
  document.getElementById('content-warning').classList.add('hidden');
});

document.querySelectorAll('.color-swatch').forEach(function(swatch) {
  swatch.addEventListener('click', function() {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    this.classList.add('selected');
    const color = this.style.background;
    document.getElementById('selected-leaf-img').style.filter =
      'drop-shadow(0 0 8px ' + color + ') brightness(1.2) saturate(3)';
  });
});

// Submit button
document.getElementById('btn-submit').addEventListener('click', async function() {
  const message = document.getElementById('leaf-message').value.trim();
  const bannedWords = ['fuck', 'shit', 'bitch', 'asshole', 'cunt', 'dick',
  'pussy', 'nigger', 'faggot', 'retard', 'whore', 'slut', 'bastard',
  'chink', 'spic', 'kike', 'wetback', 'cracker', 'tranny', 'dyke',
  'rape', 'molest', 'lynch', 'nazi', 'hitler', 'kill yourself', 'go die'];

  const messageLower = message.toLowerCase();
  const hasBannedWord = bannedWords.some(word => messageLower.includes(word));

  if (hasBannedWord) {
    document.getElementById('content-warning').classList.remove('hidden');
    return;
  }

  const selectedSwatch = document.querySelector('.color-swatch.selected');
  const selectedLeaf = document.querySelector('.leaf-option.selected');

  if (!message) { alert('Please write something on your leaf first.'); return; }
  if (!selectedSwatch) { alert('Please choose a color for your leaf.'); return; }

  const color = selectedSwatch.getAttribute('data-color');
  const leafNumber = selectedLeaf.getAttribute('data-leaf');

  this.disabled = true;
  this.textContent = 'placing your leaf...';

  const pendingLeaf = { leafNumber, message, color };

  document.getElementById('leaf-message').value = '';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.getElementById('selected-leaf-img').style.filter = 'none';
  document.getElementById('content-warning').classList.add('hidden');

  this.disabled = false;
  this.textContent = 'place my leaf';

  cleanupARListeners();
  enterAR();

  function onFound() {
    instruction.style.opacity = '0';
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      instruction.style.display = 'none';
      showTapPlacePrompt();
    }, 500);
  }

  function onLost() {
    if (!inARMode) return;
    clearTimeout(hideTimeout);
    hideTapPlacePrompt();
    instruction.style.transition = 'none';
    instruction.style.opacity = '0';
    instruction.style.display = 'block';
    setTimeout(() => {
      instruction.style.transition = 'opacity 1.5s ease';
      instruction.style.opacity = '1';
    }, 50);
  }

  onTargetFound = onFound;
  onTargetLost = onLost;
  target.addEventListener('targetFound', onTargetFound);
  target.addEventListener('targetLost', onTargetLost);
  checkAlreadyTracking(onFound);

  try {
    await window.spawnLeavesInAR(pendingLeaf);
  } catch(e) {
    alert('Error: ' + e.message);
  }

  const scene = document.querySelector('a-scene');
  scene.addEventListener('click', function onTap(e) {
    if (!window._tapToPlaceActive) return;
    scene.removeEventListener('click', onTap);

    const rect = scene.getBoundingClientRect();
const screenX = (e.clientX - rect.left) / rect.width;
const screenY = (e.clientY - rect.top) / rect.height;
const arX = (screenX - 0.5) * 4.0;
const arY = (0.5 - screenY) * 2.5 + 1.0;

window.placeLeafAtTap(arX, arY);

    hideTapPlacePrompt();
  });

window.addEventListener('leafPlaced', function onPlaced() {
    window.removeEventListener('leafPlaced', onPlaced);

    // Swap targetFound to show tap-read instead of tap-place from now on
    if (onTargetFound) target.removeEventListener('targetFound', onTargetFound);
    if (onTargetLost) target.removeEventListener('targetLost', onTargetLost);

    onTargetFound = function() {
      instruction.style.opacity = '0';
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        instruction.style.display = 'none';
        showTapReadPrompt();
      }, 500);
    };

    onTargetLost = function() {
      if (!inARMode) return;
      clearTimeout(hideTimeout);
      document.getElementById('tap-read-prompt').style.opacity = '0';
      document.getElementById('tap-read-prompt').style.display = 'none';
      instruction.style.transition = 'none';
      instruction.style.opacity = '0';
      instruction.style.display = 'block';
      setTimeout(() => {
        instruction.style.transition = 'opacity 1.5s ease';
        instruction.style.opacity = '1';
      }, 50);
    };

    target.addEventListener('targetFound', onTargetFound);
    target.addEventListener('targetLost', onTargetLost);

    // Show tap-read prompt with a slight delay so it feels distinct
    setTimeout(() => showTapReadPrompt(), 800);
  });
});

// --- Tap-to-read modal ---
const COLOR_MAP_MODAL = {
  'pale-yellow': '#FFF9A0',
  'peach':       '#FFAA80',
  'turquoise':   '#7FFFD4',
  'lime':        '#CCFF90',
  'purple':      '#D4AAFF',
  'pink':        '#FFB7C5',
};

function showLeafModal(leafEl) {
  const message = leafEl.dataset.message || '';
  const leafNumber = leafEl.dataset.leafNumber || '1';
  const color = leafEl.dataset.color || '';
  const timestamp = leafEl.dataset.timestamp || '';

  const img = document.getElementById('leaf-modal-img');
  img.src = '/Leaf-' + leafNumber + '.png';
  const hex = COLOR_MAP_MODAL[color] || '#ffffff';
  img.style.filter = 'drop-shadow(0 0 14px ' + hex + ') brightness(1.15)';

  document.getElementById('leaf-modal-message').textContent = message;

  let dateStr = '';
  if (timestamp) {
    const d = new Date(Number(timestamp));
    dateStr = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  document.getElementById('leaf-modal-date').textContent = dateStr;

  const modal = document.getElementById('leaf-modal');
  modal.style.display = 'flex';
  setTimeout(function() { modal.style.opacity = '1'; }, 10);
}

function hideLeafModal() {
  const modal = document.getElementById('leaf-modal');
  modal.style.opacity = '0';
  setTimeout(function() { modal.style.display = 'none'; }, 300);
}

document.getElementById('leaf-modal-close').addEventListener('click', hideLeafModal);
document.getElementById('leaf-modal-leaf').addEventListener('click', function(e) {
  e.stopPropagation();
});
document.getElementById('leaf-modal').addEventListener('click', hideLeafModal);

// Persistent scene click handler for tap-to-read
document.querySelector('a-scene').addEventListener('click', function(e) {
  if (window._tapToPlaceActive) return;
  if (!inARMode) return;
  if (document.getElementById('leaf-modal').style.display !== 'none') return;

  const rect = this.getBoundingClientRect();
  const screenX = (e.clientX - rect.left) / rect.width;
  const screenY = (e.clientY - rect.top) / rect.height;
  const arX = (screenX - 0.5) * 4.0;
  const arY = (0.5 - screenY) * 2.5 + 1.0;

  let nearest = null;
  let nearestDist = Infinity;
  document.querySelectorAll('.ar-leaf').forEach(function(el) {
    const lx = parseFloat(el.dataset.arX);
    const ly = parseFloat(el.dataset.arY);
    if (isNaN(lx) || isNaN(ly)) return;
    const dist = Math.sqrt(Math.pow(lx - arX, 2) + Math.pow(ly - arY, 2));
    if (dist < nearestDist) {
      nearestDist = dist;
      nearest = el;
    }
  });

  if (nearest && nearestDist < 0.25) {
    showLeafModal(nearest);
  }
});
</script>

</body>
</html>
