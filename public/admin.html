<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abundance Tree — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
    }

    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    #login-screen h1 { font-size: 22px; color: #a8c89a; margin-bottom: 8px; }

    #login-screen input {
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a2a;
      color: #f0f0f0;
      width: 260px;
      text-align: center;
    }

    #login-screen button {
      padding: 12px 32px;
      background: #4a7a3a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    #login-screen button:hover { background: #5a8a4a; }

    #login-error { color: #e07070; font-size: 14px; display: none; }

    #admin-screen {
      display: none;
      padding: 32px;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }

    header h1 { font-size: 20px; color: #a8c89a; }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px 28px;
      text-align: center;
      min-width: 140px;
    }

    .stat-box .number { font-size: 42px; font-weight: bold; color: #a8c89a; line-height: 1; }
    .stat-box .label { font-size: 13px; color: #888; margin-top: 6px; }

    h2 {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .section { margin-bottom: 40px; }

    .leaf-card {
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .leaf-card.approved { border-left: 3px solid #4a7a3a; }

    .leaf-message { font-size: 15px; color: #e0e0e0; line-height: 1.4; flex: 1; }
    .leaf-meta { font-size: 12px; color: #666; margin-top: 6px; }

    .leaf-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-delete {
      padding: 6px 14px;
      background: #7a3a3a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-delete:hover { background: #8a4a4a; }

    .empty-state { color: #555; font-size: 14px; padding: 20px 0; }
    .loading { color: #555; font-size: 14px; padding: 20px 0; }

    .color-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    #logout-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    #logout-btn:hover { border-color: #666; color: #ccc; }

    #refresh-btn {
      background: none;
      border: 1px solid #4a7a3a;
      color: #a8c89a;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-right: 8px;
    }

    #refresh-btn:hover { background: #2a3a2a; }
  </style>
</head>
<body>

  <!-- Firebase compat SDKs (no modules needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <h1>🌿 Abundance Tree Admin</h1>
    <input type="password" id="password-input" placeholder="Enter password" />
    <button onclick="checkPassword()">Enter</button>
    <div id="login-error">Incorrect password</div>
  </div>

  <!-- ADMIN SCREEN -->
  <div id="admin-screen">
    <header>
      <h1>🌿 Abundance Tree Admin</h1>
      <div>
        <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
        <button id="logout-btn" onclick="logout()">Log out</button>
      </div>
    </header>

    <div class="stats-row">
      <div class="stat-box">
        <div class="number" id="count-total">—</div>
        <div class="label">Total Leaves</div>
      </div>
      <div class="stat-box">
        <div class="number" id="count-approved">—</div>
        <div class="label">Approved</div>
      </div>
    </div>

    <div class="section">
      <h2>All Leaves</h2>
      <div id="approved-list"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <script>
    // ─── CONFIG ─────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyD8t_SxvKnNcjRlTOrMGpGzD3sO_zxLLWc"
,
      authDomain: "abundance-tree.firebaseapp.com",
      projectId: "abundance-tree",
      storageBucket: "abundance-tree.firebasestorage.app",
      messagingSenderId: "893663544560",
      appId: "1:893663544560:web:e775bebf16086bbc0eee35"
    };
    // ────────────────────────────────────────────────────────────────────────

    const ADMIN_PASSWORD = "Abundance1!";

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const colorMap = {
      "pale-yellow": "#e8d87f",
      "peach":       "#ffaa80",
      "turquoise":   "#7fffd4",
      "lime":        "#ccff90",
      "purple":      "#d4aaff",
      "pink":        "#ffb7c5",
    };

    const promptMap = {
  "1": "Today I feel rich because…",
  "2": "I share my abundance by…",
  "3": "I feel most alive when…",
};

    // ── Auth ──────────────────────────────────────────────────────────────
    function checkPassword() {
      const input = document.getElementById("password-input").value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("admin-screen").style.display = "block";
        loadData();
      } else {
        document.getElementById("login-error").style.display = "block";
      }
    }

    document.getElementById("password-input")
      .addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });

    function logout() {
      document.getElementById("admin-screen").style.display = "none";
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("password-input").value = "";
    }

    // ── Load Data ─────────────────────────────────────────────────────────
    async function loadData() {
      document.getElementById("approved-list").innerHTML = '<div class="loading">Loading...</div>';

      const snapshot = await db.collection("leaves").get();
      const leaves = [];
      snapshot.forEach(d => leaves.push({ id: d.id, ...d.data() }));

      leaves.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      const approved = leaves;

      document.getElementById("count-total").textContent    = leaves.length;
      document.getElementById("count-approved").textContent = approved.length;

      const approvedEl = document.getElementById("approved-list");
      approvedEl.innerHTML = approved.length === 0
        ? '<div class="empty-state">No leaves yet.</div>'
        : approved.map(l => leafCard(l)).join("");
    }

    function leafCard(leaf) {
      console.log(leaf.color);
      const date = leaf.timestamp
        ? new Date(leaf.timestamp * 1000).toLocaleDateString("en-US", {
            month: "short", day: "numeric",
            hour: "2-digit", minute: "2-digit"
          })
        : "unknown date";
      const color = colorMap[leaf.color] || "#888";
      return `
        <div class="leaf-card approved" id="card-${leaf.id}">
          <div class="leaf-message">
            <div style="color:#a8c89a; font-style:italic; font-size:12px; margin-bottom:6px;">${promptMap[leaf.leafNumber] || "unknown prompt"}</div>
            ${escapeHtml(leaf.message || "(no message)")}
            <div class="leaf-meta">
              <span class="color-dot" style="background:${color}"></span>
            ${leaf.color || "unknown"} &nbsp;·&nbsp;
            ${leaf.language || "unknown"} &nbsp;·&nbsp;
            ${date}
            </div>
          </div>
          <div class="leaf-actions">
            <button class="btn-delete" onclick="deleteLeaf('${leaf.id}')">Delete</button>
          </div>
        </div>`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
    }

    // ── Actions ───────────────────────────────────────────────────────────
    async function deleteLeaf(id) {
      if (!confirm("Delete this leaf permanently?")) return;
      await db.collection("leaves").doc(id).delete();
      loadData();
    }
  </script>

</body>
</html>
